name: generate contribution snake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: mal0ware
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#a855f7&color_dots=#1b1030,#3b1a66,#5b2a9e,#7800f0,#a855f7
            dist/github-snake-light.svg?palette=github-light&color_snake=#7800f0&color_dots=#efe3ff,#d8b9ff,#b57aff,#8f2bff,#7800f0

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
